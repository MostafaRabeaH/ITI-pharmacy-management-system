<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PharmaCare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular-route.js"></script>
    <script src="app.js"></script>
    <script src="services/authService.js"></script>
    <script src="services/customerService.js"></script>
    <script src="services/medicineService.js"></script>
    <script src="services/invoiceService.js"></script>
    <script src="controllers/authController.js"></script>
    <script src="controllers/dashboardController.js"></script>
    <script src="controllers/medicinesController.js"></script>
    <script src="controllers/posController.js"></script>
    <script src="controllers/customersController.js"></script>

</head>

<body ng-app="pharmaApp">

    <aside class="sidebar d-flex flex-column p-3">

        <div class="d-flex align-items-center gap-2 mb-4 pb-3 border-bottom border-secondary">
            <div class="rounded-2 d-flex align-items-center justify-content-center text-white"
                style="width:32px; height:32px; background:var(--blue)">
                <i class="bi bi-capsule-pill"></i>
            </div>
            <span class="fw-bold text-white fs-5">Pharma<span style="color:var(--blue)">Care</span></span>
        </div>

        <div class="mb-4">
            <small class="text-secondary text-uppercase fw-bold d-block mb-2" style="font-size:10px">Menu</small>
            <nav class="nav flex-column gap-1">
                <a href="#!/dashboard" class="nav-link rounded-2 p-2" ng-class="{active: isActive('/dashboard')}">
                    <i class="bi bi-grid-1x2-fill me-2"></i> Dashboard
                </a>

                <a href="#!/medicines-list" class="nav-link rounded-2 p-2"
                    ng-class="{active: isActive('/medicines-list')}">
                    <i class="bi bi-capsule-pill me-2"></i> Medicines
                </a>

                <a href="#!/customers-list" class="nav-link rounded-2 p-2"
                    ng-class="{active: isActive('/customers-list')}">
                    <i class="bi bi-people-fill me-2"></i> Customers
                </a>

                <a href="#!/invoices-history" class="nav-link rounded-2 p-2"
                    ng-class="{active: isActive('/invoices-history')}">
                    <i class="bi bi-file-earmark-medical me-2"></i> Invoices
                </a>
            </nav>
        </div>

        <div class="mb-4">
            <small class="text-secondary text-uppercase fw-bold d-block mb-2" style="font-size:10px">System</small>
            <nav class="nav flex-column gap-1">
                <a href="#" class="nav-link rounded-2 p-2">
                    <i class="bi bi-bar-chart-fill me-2"></i> Reports
                </a>
                <a href="#" class="nav-link rounded-2 p-2">
                    <i class="bi bi-gear-fill me-2"></i> Settings
                </a>
            </nav>
        </div>

        <div class="mt-auto pt-3 border-top border-secondary d-flex align-items-center gap-2">
            <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white"
                style="width:35px; height:35px; background:var(--blue); font-size:12px">AN</div>
            <div>
                <div class="text-white fw-semibold small">Admin Name</div>
                <div class="text-secondary" style="font-size:11px">Admin</div>
            </div>
        </div>

    </aside>
    <main class="content-area" style="margin-left: 250px; padding: 20px;">
        <div ng-view></div>
    </main>
</body>

</html>
