<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PharmaCare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular-route.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script src="services/authService.js"></script>
    <script src="services/customerService.js"></script>
    <script src="services/medicineService.js"></script>
    <script src="services/invoiceService.js"></script>
    <script src="controllers/authController.js"></script>
    <script src="controllers/dashboardController.js"></script>
    <script src="controllers/medicinesController.js"></script>
    <script src="controllers/posController.js"></script>
    <script src="controllers/customerController.js"></script>
    <script src="controllers/invoiceController.js"></script>

</head>

<body ng-app="pharmaApp">

    <aside class="sidebar d-flex flex-column p-3" 
           ng-class="{'show-sidebar': isSidebarOpen}"
           ng-hide="isLoginPage()">

        <div class="d-flex align-items-center gap-2 mb-4 pb-3 border-bottom border-secondary">
            <div class="rounded-2 d-flex align-items-center justify-content-center text-white"
                style="width:32px; height:32px; background:var(--blue)">
                <i class="bi bi-capsule-pill"></i>
            </div>
            <span class="fw-bold text-white fs-5">Pharma<span style="color:var(--blue)">Care</span></span>
        </div>

        <div class="mb-4">
            <small class="text-secondary text-uppercase fw-bold d-block mb-2" style="font-size:10px">Menu</small>
            <nav class="nav flex-column gap-1">
                <a href="#!/dashboard" class="nav-link rounded-2 p-2" ng-class="{active: isActive('/dashboard')}">
                    <i class="bi bi-grid-1x2-fill me-2"></i> Dashboard
                </a>

                <a href="#!/medicines-list" class="nav-link rounded-2 p-2"
                    ng-class="{active: isActive('/medicines-list') || isActive('/medicine-form')}">
                    <i class="bi bi-capsule-pill me-2"></i> Medicines
                </a>

                <a href="#!/customers-list" class="nav-link rounded-2 p-2"
                    ng-class="{active: isActive('/customers-list') || isActive('/customers-form')}">
                    <i class="bi bi-people-fill me-2"></i> Customers
                </a>

                <a href="#!/pos" class="nav-link rounded-2 p-2" ng-class="{active: isActive('/pos')}">
                    <i class="bi bi-cart-check-fill me-2"></i> Point of Sale
                </a>

                <a href="#!/invoices-history" class="nav-link rounded-2 p-2"
                    ng-class="{active: isActive('/invoices-history')}">
                    <i class="bi bi-file-earmark-medical me-2"></i> Invoices
                </a>

                <a href="#!/users-list" class="nav-link rounded-2 p-2" ng-if="currentUser.role === 'Admin'"
                    ng-class="{active: isActive('/users-list') || isActive('/user-form')}">
                    <i class="bi bi-person-gear me-2"></i> Users
                </a>

            </nav>
        </div>

        <div class="mt-auto pt-3 border-top border-secondary d-flex align-items-center gap-2">
            <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white"
                style="width:35px; height:35px; background:var(--blue); font-size:12px">{{ currentUser.username[0] |
                uppercase}}</div>
            <div class="flex-grow-1">
                <div class="d-flex align-items-center justify-content-between">
                    <div class="text-white fw-semibold small">{{ currentUser.username }}</div>

                    <a class="nav-link p-1 text-secondary" ng-click="logout()">
                        <i class="bi bi-box-arrow-right fs-6"></i>
                    </a>
                </div>
                <div class="text-secondary" style="font-size:11px">{{ currentUser.role}}</div>
            </div>
        </div>
    </aside>
    <div class="sidebar-overlay" 
         ng-class="{'show': isSidebarOpen}" 
         ng-click="toggleSidebar()"
         ng-hide="isLoginPage()">
    </div>

    <main ng-style="isLoginPage() ? {} : {'margin-left': windowWidth > 768 ? '240px' : '0'}" 
          style="padding: 20px; min-height: 100vh; transition: margin-left 0.3s ease-in-out;">
        
        <div class="d-md-none mb-3 d-flex align-items-center" ng-hide="isLoginPage()">
            <button class="btn btn-light shadow-sm text-secondary me-3" ng-click="toggleSidebar()">
                <i class="bi bi-list fs-4"></i>
            </button>
            <h5 class="fw-bold mb-0">Pharma<span style="color:var(--blue)">Care</span></h5>
        </div>

        <div ng-view></div>
    </main>

</body>

</html>
